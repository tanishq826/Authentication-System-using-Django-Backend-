<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logged In user</title>
  </head>
  <body>
    <style>

      .grow{
          animation: grow 4s infinite alternate;
          
      }
    
      @keyframes grow{
          0%{
              transform: scale(1);
    
          }
          100%{
              transform: scale(1.1);
              
          }
      }
    
    
    
      .fadein{
          opacity: 0;
          animation: fadein 1s forwards;
      }
    
      @keyframes fadein{
          to{
              opacity:1;
    
          }
      }
    </style>

    
    <div class="fadein">
    <a href="/logout">Logout<a>
    <h1>WELCOME {{request.user}}</h1>
    <h1>This is my dashboard!!</h1>
    </div>
  </body>
</html>
